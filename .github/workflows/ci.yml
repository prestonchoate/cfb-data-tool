name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libglib2.0-0 libdbus-1-3

      - name: Install dependencies
        if: runner.os == 'Linux'
        run: pip install -e .[dev,linux]

      - name: Install dependencies
        if: runner.os != 'Linux'
        run: pip install -e .[dev]

      - name: Run smoke tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/test_smoke.py tests/test_portal_crop.py -v
